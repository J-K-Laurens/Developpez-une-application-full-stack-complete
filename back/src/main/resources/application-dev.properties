spring.application.name=api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mdd?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true

# JWT (jjwt) - Development defaults
# In development, you can use this key for testing
# IMPORTANT: Always use environment variables in production!
jwt.secret=${JWT_SECRET:dev-secret-key-for-local-testing-must-be-at-least-32-chars-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.com.openclassrooms=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
