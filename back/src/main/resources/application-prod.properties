spring.application.name=api
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/mdd?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
# NEVER use 'update' in production! Use 'validate' instead
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# OpenAPI/Swagger - Disable in production
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.enabled=false

# JWT (jjwt) - MUST use environment variables in production
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging - Only WARNING and above in production
logging.level.root=WARN
logging.level.com.openclassrooms=INFO
logging.level.org.springframework.security=WARN

# Production security settings
server.error.include-message=never
server.error.include-stacktrace=never
