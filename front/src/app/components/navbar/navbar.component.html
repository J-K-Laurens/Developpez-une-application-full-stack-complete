<ng-container *ngIf="isLogged">
  <nav class="navbar">
    <div class="navbar-left">
      <img src="/assets/logo_p6.png" alt="MDD" class="navbar-logo" routerLink="/articles" />
    </div>
    <div class="navbar-right">
      <button mat-button class="nav-link logout" (click)="logout()">Se déconnecter</button>
      <button mat-button class="nav-link" routerLink="/articles" routerLinkActive="active">Articles</button>
      <button mat-button class="nav-link" routerLink="/themes" routerLinkActive="active">Thèmes</button>
      <button mat-icon-button routerLink="/profile" class="avatar-btn">
        <mat-icon>account_circle</mat-icon>
      </button>
    </div>
  </nav>
  <hr class="navbar-divider" />
</ng-container>
