<div class="page">
  <div class="page-inner">

    <div class="page-header">
      <button mat-raised-button color="primary" routerLink="create" class="create-btn">
        Créer un article
      </button>
      <span class="sort-label">Trier par &nbsp;↓</span>
    </div>

    <ng-container *ngIf="articles$ | async as result; else loading">

      <p *ngIf="result.articles.length === 0" class="empty-msg">
        Aucun article disponible pour le moment.
      </p>

      <div class="cards-grid">
        <div class="article-card" *ngFor="let article of result.articles"
             [routerLink]="['detail', article.id]">
          <h2 class="card-title">{{ article.titre ?? 'Sans titre' }}</h2>
          <div class="card-meta">
            <span>{{ article.date | date:'dd/MM/yyyy' }}</span>
            <span>{{ article.author ?? 'Auteur inconnu' }}</span>
          </div>
          <p class="card-desc">
            {{ article.content | slice:0:200 }}{{ (article.content?.length ?? 0) > 200 ? '...' : '' }}
          </p>
        </div>
      </div>

    </ng-container>

    <ng-template #loading>
      <p class="empty-msg">Chargement des articles…</p>
    </ng-template>

  </div>
</div>
